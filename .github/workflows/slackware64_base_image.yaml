on:
  schedule:
    - cron: '30 5 * * 6'
  
  push:
    branches:
      - main
      - workflows
    paths:
      - 'slackware64/build'
      - 'slackware64/Dockerfile'
      - 'slackware64/pkgs.list'
      - 'slackware64/slackpkg.conf'

  workflow_dispatch:
    inputs:
      slackware_mirror:
        description: Slackware mirror URL
        required: true
        default: 'https://mirrors.slackware.com/slackware/slackware64-15.0/'
      slackware_mirror_ssl_check:
        description: Slackware mirror SSL certificate check
        required: true
        default: 'true'

env:
  CACHE_TAG: 2026071903

jobs:
  process_mirror:
    runs-on: ubuntu-latest
    outputs:
      slackware_mirror_url: ${{ steps.slackware_mirror.outputs.url }}
      slackware_mirror_check_certificate: ${{ steps.slackware_mirror_check_certificate.outputs.no_check_certificate }}
      packages_txt_md5sum: ${{ steps.md5sums.outputs.current }}
      previous_packages_txt_md5sum: ${{ steps.md5sums.outputs.previous }}
    steps:
      - name: Set Image Details
        id: image_details
        run: |
          echo name=ghcr.io/${{ github.repository_owner }}/slackware64 >> $GITHUB_OUTPUT
          echo version=$(date +%Y%m%d) >> $GITHUB_OUTPUT

      - name: Set Slackware Mirror
        id: slackware_mirror
        run: |
          if [ ${GITHUB_EVENT_NAME} == 'workflow_dispatch' ] && [ "${{ github.event.inputs.slackware_mirror }}" != '' ]; then
            MIRROR_URL="${{ github.event.inputs.slackware_mirror }}"
          else
            MIRROR_URL='https://mirrors.slackware.com/slackware/slackware64-15.0/'
          fi
          echo "url=${MIRROR_URL}" >> $GITHUB_OUTPUT

      - name: Override Mirror SSL Certificate Checking
        id: slackware_mirror_check_certificate
        if: ${{ (github.event_name == 'workflow_dispatch') && (github.event.inputs.slackware_mirror_ssl_check == 'false') }}
        run: echo "no_check_certificate=--no-check-certificate" >> $GITHUB_OUTPUT

      - name: Process Package Lists
        id: md5sums
        run: |
          echo "current=$(wget ${{ steps.slackware_mirror_check_certificate.outputs.no_check_certificate }} ${{ steps.slackware_mirror.outputs.url }}PACKAGES.TXT -O- | md5sum | cut -f 1 -d ' ' | tail -c9)" >> $GITHUB_OUTPUT
          echo "previous=$(docker image inspect ${{ steps.image_details.outputs.name }}:latest | jq .[].Config.Labels.\"com.slackware.packages.txt.md5\")" >> $GITHUB_OUTPUT

  base_image:
    runs-on: ubuntu-latest
    needs: process_mirror
    if: ${{ (needs.process_mirror.outputs.packages_txt_md5sum != needs.process_mirror.outputs.previous_packages_txt_md5sum) || (github.event_name != 'schedule')}}
    steps:
      - uses: actions/checkout@v6

      - name: Packages
        id: packages
        run: |
          mkdir -v -p /tmp/slackware64-15.0
          wget --verbose ${{ needs.process_mirror.outputs.slackware_mirror_check_certificate }} ${{ needs.process_mirror.outputs.slackware_mirror_url }}PACKAGES.TXT -O /tmp/slackware64-15.0/PACKAGES.TXT
          echo "list_md5sum=$(md5sum slackware64/pkgs.list | cut -f 1 -d ' ' | tail -c9)" >> $GITHUB_OUTPUT

      - name: Restore Slackware Packages Cache
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/slackware64-15.0
          key: slackware-packages-${{env.CACHE_TAG}}-${{ steps.packages.outputs.list_md5sum }}-${{ needs.process_mirror.outputs.packages_txt_md5sum }}
          restore-keys: |
            slackware-packages-${{env.CACHE_TAG}}-${{ steps.packages.outputs.list_md5sum }}-
            slackware-packages-${{env.CACHE_TAG}}-

      - name: Download Slackware Packages
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Slackware Packages"
          while IFS= read -r package; do
            echo "Processing package: $package"
            PKG_URL=${{ needs.process_mirror.outputs.slackware_mirror_url }}"slackware64/`dirname $package`/$(grep -P "PACKAGE NAME:  `basename $package`\-[0-9]" /tmp/slackware64-15.0/PACKAGES.TXT | cut -c 16-)"
            mkdir -p /tmp/slackware64-15.0/slackware64/`dirname $package`
            wget --verbose ${{ needs.process_mirror.outputs.slackware_mirror_check_certificate }} -N --no-if-modified-since -P /tmp/slackware64-15.0/slackware64/`dirname $package` ${PKG_URL}
          done < slackware64/pkgs.list

      - name: Prepare Source Directory
        run: |
          rm -r -f $GITHUB_WORKSPACE/slackware64/slackware64-15.0
          mkdir -p $GITHUB_WORKSPACE/slackware64/slackware64-15.0
          cp -a /tmp/slackware64-15.0 $GITHUB_WORKSPACE/slackware64/
          wget --verbose ${{ needs.process_mirror.outputs.slackware_mirror_check_certificate }} ${{ needs.process_mirror.outputs.slackware_mirror_url }}GPG-KEY -O $GITHUB_WORKSPACE/slackware64/slackware64-15.0/GPG-KEY

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Archive
        uses: ./.github/actions/slackware64_root_fs_archive

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set Image Details
        id: image_details
        run: |
          echo name=ghcr.io/${{ github.repository_owner }}/slackware64 >> $GITHUB_OUTPUT
          echo version=$(date +%Y%m%d) >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image_details.outputs.name }}
          tags: |
            ${{ steps.image_details.outputs.version }}
            latest_test
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}/slackware64
            org.opencontainers.image.version=${{ steps.image_details.outputs.version }}
            org.opencontainers.image.title=Slackware64 Base Image
            org.opencontainers.image.description=Slackware64 base image built from a minimal slackware64-15.0 root filesystem
            org.opencontainers.image.licenses=WTFPL
            com.slackware.version=15.0
            com.slackware.arch=x86_64
            com.slackware.packages.txt.md5=${{ needs.process_mirror.outputs.packages_txt_md5sum }}

      - run: echo ${{ steps.meta.outputs.tags }} | jq .

      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: slackware64
          push: false
          load: true
          provenance: false
          tags: "${{ steps.image_details.outputs.name }}:${{ steps.image_details.outputs.version }}"

      - name: Test
        run: docker run --rm "${{ steps.image_details.outputs.name }}:${{ steps.image_details.outputs.version }}" slackpkg update

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: slackware64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
